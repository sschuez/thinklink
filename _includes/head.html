<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  {% if page.alternate_url %}
  <link rel="alternate" hreflang="{{ page.lang }}" href="{{ page.url | absolute_url }}">
  <link rel="alternate" hreflang="{% if page.lang == 'de' %}en{% else %}de{% endif %}" href="{{ page.alternate_url | absolute_url }}">
  {% endif %}

  <link rel="stylesheet" href="{{ '/assets/css/tokens.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
