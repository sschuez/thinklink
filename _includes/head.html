<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% seo %}

  {% if page.alternate_url %}
  {% if page.lang == 'de' %}{% assign x_default = page.url %}{% else %}{% assign x_default = page.alternate_url %}{% endif %}
  <link rel="alternate" hreflang="{{ page.lang }}" href="{{ page.url | absolute_url }}">
  <link rel="alternate" hreflang="{% if page.lang == 'de' %}en{% else %}de{% endif %}" href="{{ page.alternate_url | absolute_url }}">
  <link rel="alternate" hreflang="x-default" href="{{ x_default | absolute_url }}">
  {% endif %}

  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/tokens.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  {% include structured-data.html %}
</head>
