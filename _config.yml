title: ThinkLink Association
description: Gemeinnütziger Schweizer Verein für transdisziplinäres Denken zur Bewältigung globaler Polykrisen.

# Origin used for canonical URLs, og:url and sitemap entries.
# When moving to a custom domain, change this to the new origin and
# add the domain to CNAME at the repo root.
url: https://thinklinkassociation.org
baseurl: ""

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - README.md
  - CLAUDE.md
  - HOW-TO.md
  - START-HERE.md
  - SETUP.md
  - script
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - assets/fonts/README.md

# Auto-apply layout, language and locale by path so individual pages only
# declare what differs (title, description, alternate_url).
defaults:
  - scope:
      path: ""
    values:
      layout: default
      lang: de
      locale: de_CH
  - scope:
      path: "en"
    values:
      layout: default
      lang: en
      locale: en
